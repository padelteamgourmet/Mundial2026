<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Porra Mundial 2026 · PTG</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,800&family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
/* ── PTG Design Tokens ───────────────────────────── */
:root {
  --color-paper:    #F5F0E8;
  --color-court:    #1A3A2A;
  --color-ball:     #C8E632;
  --color-ink:      #0F1F17;
  --color-muted:    #6B7C6A;
  --color-border:   rgba(15,31,23,.12);
  --color-surface:  #FFFFFF;
  --color-danger:   #E05252;
  --color-match:    #2B6CB0;
  --radius-s:       6px;
  --radius-m:       12px;
  --radius-l:       20px;
  --font-display:   'Bricolage Grotesque', sans-serif;
  --font-ui:        'Geist', sans-serif;
  --shadow-card:    0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--color-paper);
  color: var(--color-ink);
  font-family: var(--font-ui);
  font-size: 14px;
  min-height: 100vh;
}

/* ── Header ─────────────────────────────────────── */
.site-header {
  background: var(--color-court);
  color: var(--color-ball);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.site-title {
  font-family: var(--font-display);
  font-size: 18px;
  font-weight: 800;
  letter-spacing: -.3px;
}
.site-title span { color: #FFF; }
.site-meta {
  font-size: 11px;
  color: rgba(200,230,50,.65);
  font-weight: 500;
}
#lastUpdate { color: rgba(200,230,50,.5); }

/* ── Tab Nav ─────────────────────────────────────── */
.tab-nav {
  background: var(--color-court);
  border-bottom: 2px solid rgba(200,230,50,.15);
  display: flex;
  padding: 0 24px;
  gap: 4px;
  overflow-x: auto;
}
.tab-nav button {
  background: none;
  border: none;
  color: rgba(200,230,50,.55);
  font-family: var(--font-ui);
  font-size: 13px;
  font-weight: 500;
  padding: 10px 16px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  margin-bottom: -2px;
  white-space: nowrap;
  transition: color .15s, border-color .15s;
}
.tab-nav button:hover { color: var(--color-ball); }
.tab-nav button.active {
  color: var(--color-ball);
  border-bottom-color: var(--color-ball);
}

/* ── Main Container ─────────────────────────────── */
.main { max-width: 1280px; margin: 0 auto; padding: 24px 16px; }

/* ── Loading / Error ────────────────────────────── */
.state-card {
  background: var(--color-surface);
  border-radius: var(--radius-l);
  padding: 48px;
  text-align: center;
  box-shadow: var(--shadow-card);
  max-width: 480px;
  margin: 48px auto;
}
.state-card h2 { font-family: var(--font-display); font-size: 22px; margin-bottom: 8px; }
.state-card p { color: var(--color-muted); font-size: 14px; line-height: 1.6; }
.spinner {
  width: 36px; height: 36px;
  border: 3px solid var(--color-border);
  border-top-color: var(--color-court);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin: 0 auto 20px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Toolbar (shared) ───────────────────────────── */
.toolbar {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
  flex-wrap: wrap;
  align-items: center;
}
.toolbar input, .toolbar select {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-s);
  padding: 8px 12px;
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--color-ink);
  outline: none;
  transition: border-color .15s;
}
.toolbar input:focus, .toolbar select:focus { border-color: var(--color-court); }
.toolbar input { min-width: 200px; }
.toolbar label { font-size: 12px; color: var(--color-muted); font-weight: 500; }

/* ── Stats Bar ──────────────────────────────────── */
.stats-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
  flex-wrap: wrap;
}
.stat-chip {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: 100px;
  padding: 4px 12px;
  font-size: 12px;
  color: var(--color-muted);
  font-weight: 500;
}
.stat-chip strong { color: var(--color-ink); }

/* ── Ranking Table ──────────────────────────────── */
.ranking-wrap { overflow-x: auto; }
.ranking-table {
  width: 100%;
  border-collapse: collapse;
  background: var(--color-surface);
  border-radius: var(--radius-l);
  overflow: hidden;
  box-shadow: var(--shadow-card);
}
.ranking-table thead {
  background: var(--color-court);
  color: var(--color-ball);
}
.ranking-table th {
  padding: 10px 12px;
  text-align: center;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: .5px;
  text-transform: uppercase;
  white-space: nowrap;
}
.ranking-table th:nth-child(2) { text-align: left; }
.ranking-table td {
  padding: 9px 12px;
  text-align: center;
  border-bottom: 1px solid var(--color-border);
  font-size: 13px;
}
.ranking-table td:nth-child(2) { text-align: left; font-weight: 500; }
.ranking-table tbody tr:last-child td { border-bottom: none; }
.ranking-table tbody tr:hover { background: rgba(26,58,42,.04); }
.rank-pos {
  font-weight: 800;
  font-family: var(--font-display);
  color: var(--color-muted);
  font-size: 15px;
}
.rank-pos.top3 { color: var(--color-court); }
.total-cell {
  font-weight: 700;
  font-family: var(--font-display);
  font-size: 16px;
  color: var(--color-court);
}

/* ── Section Heading ────────────────────────────── */
.section-heading {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 16px;
  color: var(--color-court);
}

/* ── Group / Jornada Grid ───────────────────────── */
.seg-bar {
  display: flex;
  gap: 6px;
  margin-bottom: 16px;
  flex-wrap: wrap;
}
.seg-btn {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-s);
  padding: 6px 14px;
  font-family: var(--font-ui);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: background .12s, color .12s, border-color .12s;
  color: var(--color-muted);
}
.seg-btn:hover { background: var(--color-paper); color: var(--color-ink); }
.seg-btn.active {
  background: var(--color-court);
  color: var(--color-ball);
  border-color: var(--color-court);
}

/* ── Match Card ─────────────────────────────────── */
.match-card {
  background: var(--color-surface);
  border-radius: var(--radius-m);
  box-shadow: var(--shadow-card);
  overflow: hidden;
  margin-bottom: 16px;
}
.match-header {
  background: var(--color-court);
  color: #fff;
  padding: 10px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  font-size: 13px;
}
.match-header .teams {
  font-family: var(--font-display);
  font-size: 15px;
  font-weight: 700;
  color: var(--color-ball);
}
.match-header .result-real {
  margin-left: auto;
  font-size: 12px;
  color: rgba(255,255,255,.6);
}
.match-header .result-real strong { color: #fff; font-size: 15px; }
.preds-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 1px;
  background: var(--color-border);
}
.pred-cell {
  background: var(--color-surface);
  padding: 8px 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 8px;
}
.pred-cell .player-name {
  font-size: 11px;
  color: var(--color-muted);
  font-weight: 500;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
}
.pred-score {
  font-weight: 700;
  font-size: 14px;
  color: var(--color-ink);
  white-space: nowrap;
  font-family: var(--font-display);
}
.pred-score.correct { color: #2E7D32; }
.pred-score.wrong   { color: var(--color-danger); }
.pred-score.partial { color: #E8A018; }
.no-pred { color: var(--color-border); font-size: 12px; }

/* ── Elim Phase View ────────────────────────────── */
.elim-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
  gap: 12px;
}
.elim-card {
  background: var(--color-surface);
  border-radius: var(--radius-m);
  box-shadow: var(--shadow-card);
  overflow: hidden;
}
.elim-card-header {
  background: var(--color-court);
  color: var(--color-ball);
  padding: 8px 14px;
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .3px;
}
.elim-card-body { padding: 10px 14px; }
.team-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 5px 0;
  border-bottom: 1px solid var(--color-border);
  font-size: 13px;
  gap: 8px;
}
.team-row:last-child { border-bottom: none; }
.team-name { font-weight: 600; flex: 1; }
.team-pct {
  font-family: var(--font-display);
  font-weight: 700;
  font-size: 14px;
  color: var(--color-court);
}
.team-bar-wrap {
  height: 4px;
  background: var(--color-border);
  border-radius: 2px;
  overflow: hidden;
  margin: 2px 0 6px;
}
.team-bar { height: 100%; background: var(--color-ball); border-radius: 2px; }
.player-pick-list {
  font-size: 11px;
  color: var(--color-muted);
  margin-top: 4px;
  line-height: 1.8;
}
.player-pick-list span { display: inline-block; margin-right: 4px; }

/* single pick with player list */
.pick-row {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--color-border);
}
.pick-row:last-child { border-bottom: none; }
.pick-rank { font-size: 10px; color: var(--color-muted); min-width: 20px; padding-top: 2px; }
.pick-info { flex: 1; }
.pick-team { font-weight: 600; font-size: 13px; }
.pick-players { font-size: 11px; color: var(--color-muted); margin-top: 2px; }

/* ── Comparar ───────────────────────────────────── */
.compare-selectors {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 24px;
  max-width: 600px;
}
.compare-selectors select {
  width: 100%;
  background: var(--color-surface);
  border: 2px solid var(--color-border);
  border-radius: var(--radius-m);
  padding: 10px 14px;
  font-family: var(--font-ui);
  font-size: 14px;
  font-weight: 500;
  color: var(--color-ink);
  cursor: pointer;
  transition: border-color .15s;
}
.compare-selectors select:focus { outline: none; border-color: var(--color-court); }
.compare-selectors label { font-size: 11px; color: var(--color-muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 6px; }
.compare-header {
  display: grid;
  grid-template-columns: 1fr 60px 1fr;
  align-items: center;
  gap: 8px;
  margin-bottom: 12px;
  font-family: var(--font-display);
  font-size: 16px;
  font-weight: 700;
  text-align: center;
}
.compare-header .vs { font-size: 12px; color: var(--color-muted); font-weight: 500; }
.compare-section-title {
  font-size: 11px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .5px;
  color: var(--color-muted);
  padding: 10px 0 4px;
  border-top: 1px solid var(--color-border);
  margin-top: 4px;
}
.compare-row {
  display: grid;
  grid-template-columns: 1fr 60px 1fr;
  align-items: center;
  gap: 8px;
  padding: 7px 0;
  border-bottom: 1px solid rgba(0,0,0,.04);
}
.compare-row .label {
  text-align: center;
  font-size: 11px;
  color: var(--color-muted);
  font-weight: 500;
}
.compare-val {
  padding: 5px 10px;
  border-radius: var(--radius-s);
  font-size: 13px;
  font-weight: 500;
  text-align: center;
}
.compare-val.same { background: rgba(26,58,42,.06); color: var(--color-court); }
.compare-val.diff-a { background: rgba(46,125,50,.12); color: #1B5E20; }
.compare-val.diff-b { background: rgba(224,82,82,.12); color: #B71C1C; }
.compare-val.empty { color: var(--color-border); font-size: 11px; }

.diff-legend {
  display: flex;
  gap: 16px;
  margin-bottom: 16px;
  font-size: 12px;
  color: var(--color-muted);
}
.diff-legend span { display: flex; align-items: center; gap: 6px; }
.diff-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* ── Responsive ─────────────────────────────────── */
@media (max-width: 600px) {
  .main { padding: 16px 10px; }
  .compare-selectors { grid-template-columns: 1fr; }
  .compare-header, .compare-row { grid-template-columns: 1fr 40px 1fr; }
  .ranking-table th, .ranking-table td { padding: 8px 6px; font-size: 12px; }
}
</style>
</head>
<body>

<header class="site-header">
  <div>
    <div class="site-title">Porra Mundial 2026 <span>· PTG</span></div>
    <div class="site-meta">Actualizado: <span id="lastUpdate">—</span></div>
  </div>
</header>

<nav class="tab-nav">
  <button class="active" data-tab="clasificacion">Clasificación</button>
  <button data-tab="grupos">Partidos</button>
  <button data-tab="elim">Eliminatorias</button>
  <button data-tab="comparar">Comparar</button>
</nav>

<main class="main">
  <div id="tab-clasificacion" class="tab-panel"></div>
  <div id="tab-grupos"        class="tab-panel" style="display:none"></div>
  <div id="tab-elim"          class="tab-panel" style="display:none"></div>
  <div id="tab-comparar"      class="tab-panel" style="display:none"></div>
</main>

<script>
// ══════════════════════════════════════════════════
// CONFIG — rellena APPS_SCRIPT_URL tras desplegar Code.gs
// ══════════════════════════════════════════════════
const CONFIG = {
  APPS_SCRIPT_URL: 'https://script.google.com/macros/s/AKfycbx5jlUo6qWlGXSTGN4S9msrJU1A01zifN74oWU5jU15FLdgKl-ByUxrXyKvYIW5Wi053A/exec', 
  SHEET_CSV_URL: 'https://docs.google.com/spreadsheets/d/e/2PACX-1vToy6arhppBF8migeZBUcnpkm35UhwBONG_SU_Of-Jinwk5p5uF-QDn47ThowTVxdlGhv4nDXUNruoE/pub?gid=1984444339&single=true&output=csv',
  REFRESH_MS: 90000
};

// ══════════════════════════════════════════════════
// STATE
// ══════════════════════════════════════════════════
let DATA = null;          // full JSON from Apps Script
let RANKING = [];         // [{pos,name,total,...}]
let RESULTADOS = null;    // real results
let PREDICTIONS = {};     // {playerName: {groupMatches, k16, k8, ...}}
let PLAYER_ORDER = [];    // sorted by ranking

// ── UI State ──────────────────────────────────────
let activeTab = 'clasificacion';
let gruposState = { group: 'A', jornada: 1 };
let elimState = { phase: 'k16' };
let compareState = { a: '', b: '' };

// ══════════════════════════════════════════════════
// BOOTSTRAP
// ══════════════════════════════════════════════════
document.querySelectorAll('.tab-nav button').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTab = btn.dataset.tab;
    document.querySelectorAll('.tab-nav button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
    document.getElementById('tab-' + activeTab).style.display = '';
    renderActiveTab();
  });
});

loadData();
setInterval(loadData, CONFIG.REFRESH_MS);

// ══════════════════════════════════════════════════
// DATA LOADING
// ══════════════════════════════════════════════════
async function loadData() {
  if (!DATA) showLoading('clasificacion');

  try {
    if (CONFIG.APPS_SCRIPT_URL) {
      const res = await fetch(CONFIG.APPS_SCRIPT_URL);
      if (!res.ok) throw new Error('HTTP ' + res.status);
      DATA = await res.json();
      if (DATA.error) throw new Error(DATA.error);
      RANKING      = DATA.ranking      || [];
      RESULTADOS   = DATA.resultados   || null;
      PREDICTIONS  = DATA.predictions  || {};
      PLAYER_ORDER = DATA.playerOrder  || RANKING.map(p => p.name);
    } else {
      // Fallback: sólo clasificación via CSV público
      const csv = await fetchCSV(CONFIG.SHEET_CSV_URL);
      RANKING = parseCSVRanking(csv);
      PLAYER_ORDER = RANKING.map(p => p.name);
    }

    const ts = DATA ? new Date(DATA.updatedAt).toLocaleTimeString('es-ES', {hour:'2-digit',minute:'2-digit'}) : new Date().toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('lastUpdate').textContent = ts;

    renderActiveTab();

  } catch (err) {
    showError(err.message);
  }
}

async function fetchCSV(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error('No se pudo cargar el CSV');
  return res.text();
}

// CSV Ranking parser (fallback, same logic as original index.html)
function parseCSVRanking(csv) {
  const rows = csv.split('\n').map(r => r.trim()).filter(Boolean);
  const players = [];
  for (let i = 1; i < rows.length; i++) {
    const cols = smartSplit(rows[i]);
    const name = (cols[1] || '').trim();
    if (!name || name === 'Jugador' || /^J\d+$/.test(name)) continue;
    const total = Number(cols[13]);
    if (isNaN(total)) continue;
    players.push({
      pos:    cols[0], name,
      grupos: Number(cols[2])  || 0,
      sxv:   Number(cols[3])  || 0,
      oct:   Number(cols[4])  || 0,
      cua:   Number(cols[5])  || 0,
      q4:    Number(cols[6])  || 0,
      q3:    Number(cols[7])  || 0,
      sub:   Number(cols[8])  || 0,
      camp:  Number(cols[9])  || 0,
      mvp:   Number(cols[10]) || 0,
      pichM: Number(cols[11]) || 0,
      pichE: Number(cols[12]) || 0,
      total
    });
  }
  return players;
}

function smartSplit(row) {
  // handles quoted fields with commas
  const result = [];
  let inQ = false, cur = '';
  for (const ch of row) {
    if (ch === '"') { inQ = !inQ; continue; }
    if (ch === ',' && !inQ) { result.push(cur); cur = ''; continue; }
    cur += ch;
  }
  result.push(cur);
  return result;
}

// ══════════════════════════════════════════════════
// RENDER DISPATCH
// ══════════════════════════════════════════════════
function renderActiveTab() {
  switch (activeTab) {
    case 'clasificacion': renderRanking(); break;
    case 'grupos':        renderGrupos(); break;
    case 'elim':          renderElim();   break;
    case 'comparar':      renderComparar(); break;
  }
}

// ══════════════════════════════════════════════════
// TAB 1: CLASIFICACIÓN
// ══════════════════════════════════════════════════
function renderRanking() {
  const el = document.getElementById('tab-clasificacion');
  if (!RANKING.length) { el.innerHTML = loadingHTML(); return; }

  const search = (el.querySelector('.search-input') || {value:''}).value.toLowerCase();
  const rows = RANKING.filter(p => !search || p.name.toLowerCase().includes(search));

  el.innerHTML = `
    <div class="toolbar">
      <input class="search-input" type="search" placeholder="Buscar jugador…" value="${search}" oninput="renderRanking()"/>
    </div>
    <div class="stats-bar">
      <div class="stat-chip"><strong>${RANKING.length}</strong> jugadores</div>
      ${RANKING[0] ? `<div class="stat-chip">Líder <strong>${RANKING[0].name}</strong> · ${RANKING[0].total} pts</div>` : ''}
    </div>
    <div class="ranking-wrap">
      <table class="ranking-table">
        <thead>
          <tr>
            <th>#</th><th>Jugador</th>
            <th title="Grupos">GR</th>
            <th title="16avos">16</th>
            <th title="Octavos">8</th>
            <th title="Cuartos">4</th>
            <th title="4º puesto">4º</th>
            <th title="3er puesto">3º</th>
            <th title="Subcampeón">Sub</th>
            <th title="Campeón">Camp</th>
            <th title="MVP">MVP</th>
            <th title="Pichichi Mundial">PiM</th>
            <th title="Pichichi España">PiE</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(p => `
            <tr>
              <td><span class="rank-pos ${Number(p.pos)<=3?'top3':''}">${p.pos}</span></td>
              <td>${esc(p.name)}</td>
              <td>${p.grupos}</td>
              <td>${p.sxv}</td>
              <td>${p.oct}</td>
              <td>${p.cua}</td>
              <td>${p.q4}</td>
              <td>${p.q3}</td>
              <td>${p.sub}</td>
              <td>${p.camp}</td>
              <td>${p.mvp}</td>
              <td>${p.pichM}</td>
              <td>${p.pichE}</td>
              <td class="total-cell">${p.total}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>`;

  // Re-attach search listener after innerHTML replacement
  el.querySelector('.search-input').addEventListener('input', renderRanking);
}

function renderGrupos() {

        <div class="seg-bar" id="group-seg">

function renderMatchCards(group, jornada) {
  const container = document.getElementById('matches-container');
  if (!container) return;

  // Get all matches for this group from Resultados_Reales (all players should have same structure)
  // Use first player as reference for match list, or resultados
  const refPreds = RESULTADOS || Object.values(PREDICTIONS)[0];
  if (!refPreds) { container.innerHTML = '<p style="color:var(--color-muted)">Sin datos de partidos</p>'; return; }

  const allGroupMatches = (refPreds.groupMatches || []).filter(m => m.group === group);

  // Jornada 1 = matches 0,1,2 (first 3); Jornada 2 = 3,4,5; Jornada 3 = 6,7,8
  // But we don't have explicit jornada in data, so split by index within group
  const matchesInGroup = allGroupMatches;
  const perJornada = Math.ceil(matchesInGroup.length / 3) || 3;
  const start = (jornada - 1) * perJornada;
  const end   = start + perJornada;
  const jornMatches = matchesInGroup.slice(start, end);

  if (!jornMatches.length) {
    container.innerHTML = '<p style="color:var(--color-muted)">No hay partidos registrados para Grupo ' + group + ', Jornada ' + jornada + '.</p>';
    return;
  }

  container.innerHTML = jornMatches.map((realMatch, idx) => {
    const realScore = (RESULTADOS && RESULTADOS.groupMatches) ?
      RESULTADOS.groupMatches.find(m => m.group === group && m.local === realMatch.local && m.visitor === realMatch.visitor) : null;
    const realGl = realScore && realScore.gl !== null ? realScore.gl : null;
    const realGv = realScore && realScore.gv !== null ? realScore.gv : null;
    const played  = realGl !== null && realGv !== null;

    const predRows = PLAYER_ORDER.map(player => {
      const pp = PREDICTIONS[player];
      if (!pp) return null;
      const pm = (pp.groupMatches || []).find(m => m.group === group && m.local === realMatch.local && m.visitor === realMatch.visitor);
      if (!pm) return null;
      return { player, gl: pm.gl, gv: pm.gv };
    }).filter(Boolean);

    return `
      <div class="match-card">
        <div class="match-header">
          <div>
            <div class="teams">${esc(realMatch.local)} vs ${esc(realMatch.visitor)}</div>
            <div style="font-size:11px;color:rgba(255,255,255,.5)">Grupo ${group}</div>
          </div>
          ${played
            ? `<div class="result-real">Resultado real <strong>${realGl} – ${realGv}</strong></div>`
            : `<div class="result-real" style="font-style:italic">Sin resultado aún</div>`}
        </div>
        <div class="preds-grid">
          ${predRows.map(pr => {
            const hasPred = pr.gl !== null && pr.gv !== null;
            let cls = '';
            if (hasPred && played) {
              if (pr.gl === realGl && pr.gv === realGv) cls = 'correct';
              else if (sign(pr.gl - pr.gv) === sign(realGl - realGv)) cls = 'partial';
              else cls = 'wrong';
            }
            return `
              <div class="pred-cell">
                <span class="player-name" title="${esc(pr.player)}">${esc(shortName(pr.player))}</span>
                ${hasPred
                  ? `<span class="pred-score ${cls}">${pr.gl}–${pr.gv}</span>`
                  : `<span class="no-pred">—</span>`}
              </div>`;
          }).join('')}
        </div>
      </div>`;
  }).join('');
}

function renderElimContent(phase) {
  const container = document.getElementById('elim-content');
  if (!container) return;

  if (phase === 'k16') { renderK16(container); return; }
  if (phase === 'k8' || phase === 'k4' || phase === 'k2') { renderKnockout(container, phase); return; }
  renderSpecialPick(container, phase);
}

function renderK16(container) {
  // 16 matches, each player picks 2 teams
  // Build map: matchIdx → {eq1: str, eq2: str, picks: {playerName: 'winner team'}}
  const refPreds = RESULTADOS || Object.values(PREDICTIONS)[0];
  const matchCount = refPreds && refPreds.k16 ? refPreds.k16.length : 0;
  if (!matchCount) {
    container.innerHTML = '<p style="color:var(--color-muted)">Sin datos de 16avos</p>';
    return;
  }

  // Build per-match vote tally
  // For each match, each player's k8[idx] is their picked winner (team to advance)
  const matchData = [];
  for (let i = 0; i < matchCount; i++) {
    const ref = refPreds.k16[i];
    const realWinner = RESULTADOS && RESULTADOS.k8 ? RESULTADOS.k8[i] || null : null;
    const picks = {}; // teamName → [players]
    PLAYER_ORDER.forEach(player => {
      const pp = PREDICTIONS[player];
      const winner = pp && pp.k8 ? pp.k8[i] || null : null;
      if (winner) {
        if (!picks[winner]) picks[winner] = [];
        picks[winner].push(player);
      }
    });
    matchData.push({ match: ref.match, eq1: ref.eq1, eq2: ref.eq2, realWinner, picks });
  }

  container.innerHTML = `<div class="elim-grid">
    ${matchData.map(m => {
      const teams = Object.entries(m.picks).sort((a,b) => b[1].length - a[1].length);
      const total = PLAYER_ORDER.length;
      return `
        <div class="elim-card">
          <div class="elim-card-header">Partido ${m.match} · ${esc(m.eq1||'?')} vs ${esc(m.eq2||'?')}</div>
          <div class="elim-card-body">
            ${m.realWinner ? `<div style="font-size:11px;color:var(--color-muted);margin-bottom:6px">Pasó: <strong style="color:var(--color-court)">${esc(m.realWinner)}</strong></div>` : ''}
            ${teams.length === 0
              ? '<p class="no-pred">Sin picks</p>'
              : teams.map(([team, players]) => {
                  const pct = total > 0 ? Math.round(players.length / total * 100) : 0;
                  return `
                    <div class="team-row">
                      <span class="team-name">${esc(team)}</span>
                      <span class="team-pct">${players.length}</span>
                    </div>
                    <div class="team-bar-wrap"><div class="team-bar" style="width:${pct}%"></div></div>
                    <div class="player-pick-list">${players.slice(0,12).map(p => `<span>${esc(shortName(p))}</span>`).join('')}${players.length>12?`<span>+${players.length-12}</span>`:''}</div>`;
                }).join('')}
          </div>
        </div>`;
    }).join('')}
  </div>`;
}

function renderKnockout(container, phase) {
  // phase = 'k8' (cuartos), 'k4' (semis), 'k2' (finalistas)
  // Each player has an array; collect votes per team per slot
  const labels = { k8: 'Octavos', k4: 'Cuartos', k2: 'Semis' };

  // Build tally per slot
  const ref = RESULTADOS || Object.values(PREDICTIONS)[0];
  const slotsRef = ref ? (ref[phase] || []) : [];
  const slots = [];

  // Determine how many slots (use max across all players)
  let maxSlots = slotsRef.length;
  PLAYER_ORDER.forEach(player => {
    const pp = PREDICTIONS[player];
    if (pp && pp[phase] && pp[phase].length > maxSlots) maxSlots = pp[phase].length;
  });

  for (let i = 0; i < maxSlots; i++) {
    const realTeam = RESULTADOS && RESULTADOS[phase] ? RESULTADOS[phase][i] || null : null;
    const picks = {};
    PLAYER_ORDER.forEach(player => {
      const pp = PREDICTIONS[player];
      const team = pp && pp[phase] ? pp[phase][i] || null : null;
      if (team) {
        if (!picks[team]) picks[team] = [];
        picks[team].push(player);
      }
    });
    slots.push({ slot: i + 1, realTeam, picks });
  }

  if (!slots.length) {
    container.innerHTML = `<p style="color:var(--color-muted)">Sin datos de ${labels[phase]||phase}</p>`;
    return;
  }

  container.innerHTML = `<div class="elim-grid">
    ${slots.map(s => {
      const teams = Object.entries(s.picks).sort((a,b) => b[1].length - a[1].length);
      const total = PLAYER_ORDER.length;
      return `
        <div class="elim-card">
          <div class="elim-card-header">${labels[phase]} · Clasificado ${s.slot}</div>
          <div class="elim-card-body">
            ${s.realTeam ? `<div style="font-size:11px;color:var(--color-muted);margin-bottom:6px">Real: <strong style="color:var(--color-court)">${esc(s.realTeam)}</strong></div>` : ''}
            ${teams.map(([team, players]) => {
              const pct = total > 0 ? Math.round(players.length / total * 100) : 0;
              return `
                <div class="team-row">
                  <span class="team-name">${esc(team)}</span>
                  <span class="team-pct">${players.length} <span style="font-size:10px;font-weight:400;color:var(--color-muted)">(${pct}%)</span></span>
                </div>
                <div class="team-bar-wrap"><div class="team-bar" style="width:${pct}%"></div></div>
                <div class="player-pick-list">${players.slice(0,10).map(p => `<span>${esc(shortName(p))}</span>`).join('')}${players.length>10?`<span>+${players.length-10}</span>`:''}</div>`;
            }).join('')}
          </div>
        </div>`;
    }).join('')}
  </div>`;
}

function renderSpecialPick(container, phase) {
  const labelMap = {
    campeon: 'Campeón del Mundial',
    mvp: 'MVP del torneo',
    pichichi: 'Pichichi del Mundial',
    pichichiEsp: 'Pichichi de España'
  };

  const picks = {};
  PLAYER_ORDER.forEach(player => {
    const pp = PREDICTIONS[player];
    const pick = pp ? pp[phase] || null : null;
    if (pick) {
      if (!picks[pick]) picks[pick] = [];
      picks[pick].push(player);
    }
  });

  const realPick = RESULTADOS ? RESULTADOS[phase] || null : null;
  const sorted = Object.entries(picks).sort((a,b) => b[1].length - a[1].length);
  const total = PLAYER_ORDER.length;

  if (!sorted.length) {
    container.innerHTML = `<p style="color:var(--color-muted)">Sin picks para ${labelMap[phase]||phase}</p>`;
    return;
  }

  container.innerHTML = `
    <div class="section-heading" style="font-size:16px">${labelMap[phase] || phase}</div>
    ${realPick ? `<div style="margin-bottom:12px;font-size:13px;color:var(--color-muted)">Resultado real: <strong style="color:var(--color-court);font-size:15px">${esc(realPick)}</strong></div>` : ''}
    <div style="background:var(--color-surface);border-radius:var(--radius-m);box-shadow:var(--shadow-card);padding:16px 20px;max-width:600px">
      ${sorted.map(([ pick, players], idx) => {
        const pct = total > 0 ? Math.round(players.length / total * 100) : 0;
        return `
          <div class="pick-row">
            <div class="pick-rank">${idx+1}</div>
            <div class="pick-info">
              <div class="pick-team">${esc(pick)} <span style="color:var(--color-muted);font-size:12px">${players.length} (${pct}%)</span></div>
              <div class="team-bar-wrap" style="margin:4px 0"><div class="team-bar" style="width:${pct}%"></div></div>
              <div class="pick-players">${players.map(p => esc(shortName(p))).join(' · ')}</div>
            </div>
          </div>`;

function renderCompareOutput(nameA, nameB) {
  const container = document.getElementById('compare-output');
  if (!container) return;

  const pA = PREDICTIONS[nameA];
  const pB = PREDICTIONS[nameB];

  if (!pA || !pB) {
    container.innerHTML = '<p style="color:var(--color-muted)">Sin datos para uno o ambos jugadores.</p>';
    return;
  }

  // Ranking info
  const rA = RANKING.find(p => p.name === nameA);
  const rB = RANKING.find(p => p.name === nameB);

  let html = `
    <div class="compare-header">
      <div>${esc(nameA)} ${rA ? `<span style="font-size:12px;color:var(--color-muted);font-weight:400">#${rA.pos} · ${rA.total}pts</span>` : ''}</div>
      <div class="vs">VS</div>
      <div>${esc(nameB)} ${rB ? `<span style="font-size:12px;color:var(--color-muted);font-weight:400">#${rB.pos} · ${rB.total}pts</span>` : ''}</div>
    </div>
    <div style="background:var(--color-surface);border-radius:var(--radius-m);box-shadow:var(--shadow-card);padding:16px 20px">`;

  // Special picks comparison
  const specials = [
    { key: 'campeon',     label: 'Campeón' },
    { key: 'subcampeon',  label: 'Subcampeón' },
    { key: 'tercero',     label: '3er puesto' },
    { key: 'cuarto',      label: '4º puesto' },
    { key: 'mvp',         label: 'MVP' },
    { key: 'pichichi',    label: 'Pichichi Mundial' },
    { key: 'pichichiEsp', label: 'Pichichi España' },
  ];

  html += `<div class="compare-section-title">Picks especiales</div>`;
  specials.forEach(s => {
    const va = pA[s.key] || null;
    const vb = pB[s.key] || null;
    const same = va === vb && va !== null;
    html += `
      <div class="compare-row">
        <div class="compare-val ${va ? (same ? 'same' : 'diff-a') : 'empty'}">${va ? esc(va) : '—'}</div>
        <div class="label">${s.label}</div>
        <div class="compare-val ${vb ? (same ? 'same' : 'diff-b') : 'empty'}">${vb ? esc(vb) : '—'}</div>
      </div>`;
  });

  // Finalists / bracket picks
  html += `<div class="compare-section-title">Finalistas</div>`;
  const maxK2 = Math.max((pA.k2||[]).length, (pB.k2||[]).length);
  for (let i = 0; i < maxK2; i++) {
    const va = pA.k2 ? pA.k2[i] || null : null;
    const vb = pB.k2 ? pB.k2[i] || null : null;
    const same = va && vb && va === vb;
    html += `
      <div class="compare-row">
        <div class="compare-val ${va ? (same?'same':'diff-a') : 'empty'}">${va ? esc(va) : '—'}</div>
        <div class="label">Finalista ${i+1}</div>
        <div class="compare-val ${vb ? (same?'same':'diff-b') : 'empty'}">${vb ? esc(vb) : '—'}</div>
      </div>`;
  }

  // 16avos winner picks (k8 array = who each player picked to pass from 16avos)
  html += `<div class="compare-section-title">16avos — equipo que pasa</div>`;
  const refK16 = RESULTADOS && RESULTADOS.k16 ? RESULTADOS.k16 : (pA.k16 || []);
  const maxK8 = Math.max((pA.k8||[]).length, (pB.k8||[]).length, refK16.length);
  for (let i = 0; i < maxK8; i++) {
    const matchInfo = refK16[i] ? `${refK16[i].eq1||'?'} vs ${refK16[i].eq2||'?'}` : `Partido ${i+1}`;
    const va = pA.k8 ? pA.k8[i] || null : null;
    const vb = pB.k8 ? pB.k8[i] || null : null;
    const same = va && vb && va === vb;
    html += `
      <div class="compare-row">
        <div class="compare-val ${va ? (same?'same':'diff-a') : 'empty'}">${va ? esc(va) : '—'}</div>
        <div class="label" style="font-size:10px">${esc(matchInfo)}</div>
        <div class="compare-val ${vb ? (same?'same':'diff-b') : 'empty'}">${vb ? esc(vb) : '—'}</div>
      </div>`;
  }

  // Group matches diff (only show matches where they differ)
  const groupDiffs = [];
  const allMatches = new Map();
  (pA.groupMatches||[]).forEach(m => {
    const key = `${m.group}_${m.local}_${m.visitor}`;
    allMatches.set(key, { match: m, predA: m });
  });
  (pB.groupMatches||[]).forEach(m => {
    const key = `${m.group}_${m.local}_${m.visitor}`;
    const ex = allMatches.get(key) || {};
    allMatches.set(key, { ...ex, match: m, predB: m });
  });

  allMatches.forEach(({ match, predA, predB }) => {
    const scoreA = predA && predA.gl !== null ? `${predA.gl}–${predA.gv}` : null;
    const scoreB = predB && predB.gl !== null ? `${predB.gl}–${predB.gv}` : null;
    if (scoreA !== scoreB) {
      groupDiffs.push({ match, scoreA, scoreB });
    }
  });

  if (groupDiffs.length) {
    html += `<div class="compare-section-title">Fase de grupos — diferencias (${groupDiffs.length})</div>`;
    groupDiffs.forEach(({ match, scoreA, scoreB }) => {
      html += `
        <div class="compare-row">
          <div class="compare-val diff-a">${scoreA ? esc(scoreA) : '—'}</div>
          <div class="label" style="font-size:10px">${esc(match.local)} vs ${esc(match.visitor)}</div>
          <div class="compare-val diff-b">${scoreB ? esc(scoreB) : '—'}</div>
        </div>`;
    });
  } else {
    html += `<div class="compare-section-title">Fase de grupos</div>
      <div style="padding:10px 0;color:var(--color-muted);font-size:13px">Predicciones idénticas en todos los partidos de grupo.</div>`;
  }

  html += `</div>`;
  container.innerHTML = html;
}

// ══════════════════════════════════════════════════
// UTILITIES
// ══════════════════════════════════════════════════
function esc(str) {
  if (!str) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function shortName(name) {
  // "García López, Javier" → "J. García"
  const parts = name.split(/[\s,]+/).filter(Boolean);
  if (parts.length >= 2) return parts[0].charAt(0).toUpperCase() + '. ' + parts[1];
  return name.length > 12 ? name.substring(0, 12) + '…' : name;
}

function sign(x) { return x > 0 ? 1 : x < 0 ? -1 : 0; }

function loadingHTML() {
  return `<div class="state-card"><div class="spinner"></div><h2>Cargando…</h2><p>Obteniendo datos del campeonato.</p></div>`;
}

function showLoading(tab) {
  document.getElementById('tab-' + tab).innerHTML = loadingHTML();
}

function showError(msg) {
  document.getElementById('tab-' + activeTab).innerHTML = `
    <div class="state-card">
      <h2>Error al cargar</h2>
      <p>${esc(msg)}</p>
      <p style="margin-top:12px;font-size:12px">Comprueba que APPS_SCRIPT_URL está configurada y la Web App desplegada.</p>
    </div>`;
}

function needsAPIHTML(feature) {
  return `
    <div class="state-card">
      <h2>Configuración necesaria</h2>
